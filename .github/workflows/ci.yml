name: CI - Build Test

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '24.x'

jobs:
  build:
    name: Build Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: npm install
        
      - name: Build (${{ matrix.platform }})
        run: npm run dist:${{ matrix.platform }} -- --publish never
        
      - name: Check artifacts
        run: |
          ls -la dist/
        shell: bash
        
      - name: Summary
        run: |
          echo "✅ ${{ matrix.platform }} build successful!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
