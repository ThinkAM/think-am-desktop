name: Build and Release Desktop Client

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '24.x'

jobs:
  release:
    name: Build Desktop Client
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win
            artifact: ThinkAM-Builder-Setup.exe
          - os: macos-latest
            platform: mac
            artifact: ThinkAM-Builder.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: ThinkAM-Builder.AppImage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: npm install
        
      - name: Build & Publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:${{ matrix.platform }}
        
      - name: Summary
        run: |
          echo "✅ ${{ matrix.platform }} build completed!"
          echo "📦 Platform: ${{ matrix.platform }}"
          echo "🏷️  Version: ${{ github.ref_name }}"
          echo "📄 Artifact: ${{ matrix.artifact }}"
