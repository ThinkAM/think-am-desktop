name: Build and Release Desktop Client

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '24.x'

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      
    steps:
      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  release:
    name: Build Desktop Client
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win
            artifact: ThinkAM-Builder-Setup.exe
          - os: macos-latest
            platform: mac
            artifact: ThinkAM-Builder.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: ThinkAM-Builder.AppImage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: npm install
        
      - name: Build & Publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:${{ matrix.platform }}
        
      - name: Summary
        run: |
          echo "✅ ${{ matrix.platform }} build completed!"
          echo "📦 Platform: ${{ matrix.platform }}"
          echo "🏷️  Version: ${{ github.ref_name }}"
          echo "📄 Artifact: ${{ matrix.artifact }}"
          
  finalize:
    name: Publish Release as Latest
    needs: [release]
    runs-on: ubuntu-latest
    
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Success
        run: |
          echo "✅ Release ${{ github.ref_name }} is now PUBLISHED and marked as LATEST"
          echo "🌐 Download: https://github.com/ThinkAM/think-am-desktop/releases/latest"
          echo "📱 Auto-update enabled for desktop clients"
