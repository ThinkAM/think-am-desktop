<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" />
  <title>Think A.M. Builder — Desktop</title>
  <link rel="stylesheet" href="launcher.css" />
</head>
<body>
  <main class="shell">
    <header class="brand">
      <div class="brand__mark">✈</div>
      <div class="brand__text">
        <strong>Think A.M.</strong>
        <span>Builder · Desktop</span>
      </div>
    </header>

    <!-- Logged out: just the login form. -->
    <section id="logged-out">
      <div class="hero">
        <h1>Conecte-se ao seu Builder</h1>
        <p>Entre com sua conta Think A.M. Builder para continuar.</p>
      </div>

      <section class="card">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" spellcheck="false" placeholder="voce@empresa.com" />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>
        <button id="login-btn" class="btn btn--primary btn--wide" type="button">Entrar</button>
        <p class="hint" id="login-msg"></p>
      </section>
    </section>

    <!-- Logged in: account + single primary action, advanced settings collapsed. -->
    <section id="logged-in" hidden>
      <section class="card">
        <div class="account">
          <div class="account__info">
            <strong id="acct-email"></strong>
            <span id="acct-plan" class="badge"></span>
          </div>
          <button id="logout-btn" class="btn btn--ghost btn--compact" type="button">Sair</button>
        </div>
        <p class="hint" id="plan-hint"></p>

        <button id="open-btn" class="btn btn--primary btn--wide" type="button">
          Entrar no Builder
        </button>
      </section>

      <details class="advanced">
        <summary>Configurações avançadas</summary>

        <section class="card">
          <div class="field">
            <label>Ambiente</label>
            <div class="segmented">
              <button id="env-prod" class="seg active" type="button">Produção</button>
              <button id="env-custom" class="seg" type="button">Personalizado</button>
            </div>
          </div>

          <div id="custom-fields" class="custom hidden">
            <div class="field">
              <label for="apiUrl">API URL</label>
              <input id="apiUrl" type="url" spellcheck="false" placeholder="https://api.tbldr.com.br" />
            </div>
            <div class="field">
              <label for="appUrl">App URL</label>
              <input id="appUrl" type="url" spellcheck="false" placeholder="https://tbldr.com.br" />
            </div>
          </div>

          <div class="status-row">
            <div class="status" id="api-status">
              <span class="dot" id="api-dot"></span>
              <span id="api-text">API: não verificada</span>
            </div>
            <button id="test-btn" class="btn btn--ghost" type="button">Testar conexão</button>
          </div>

          <div class="status-row">
            <div class="status" id="figma-status">
              <span class="dot" id="figma-dot"></span>
              <span id="figma-text">Ponte Figma local: não verificada</span>
            </div>
            <button id="figma-btn" class="btn btn--ghost" type="button">Verificar Figma</button>
          </div>

          <button id="bridge-btn" class="btn btn--ghost btn--wide" type="button">
            Abrir ponte Figma (local)
          </button>
        </section>
      </details>
    </section>

    <footer class="foot">
      <span id="version">v0.1.0</span>
      <a href="#" id="site-link">tbldr.com.br</a>
    </footer>
  </main>

  <script src="launcher.js"></script>
</body>
</html>
